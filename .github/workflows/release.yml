name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.14.1"
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and package extension
        run: pnpm package
      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' dist/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"
      - name: Create release package
        run: |
          # Rename the package.zip created by pnpm package
          mv package.zip uniqtab-v${{ steps.version.outputs.version }}.zip

          # Create a source code archive
          zip -r uniqtab-source-v${{ steps.version.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*release-package*" \
            -x "*.zip"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "Release $RELEASE_TAG" \
            --generate-notes \
            "uniqtab-v${RELEASE_VERSION}.zip" \
            "uniqtab-source-v${RELEASE_VERSION}.zip"
      - name: Upload Release Assets Summary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "### Release Created Successfully!"
            echo ""
            echo "**Version:** v${RELEASE_VERSION}"
            echo "**Tag:** ${RELEASE_TAG}"
            echo ""
            echo "**Assets:**"
            echo "- \`uniqtab-v${RELEASE_VERSION}.zip\` - Chrome Extension package"
            echo "- \`uniqtab-source-v${RELEASE_VERSION}.zip\` - Source code"
          } >> "$GITHUB_STEP_SUMMARY"
    permissions:
      contents: write
    timeout-minutes: 90
