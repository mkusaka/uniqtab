name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package extension
        run: pnpm package

      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' dist/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Create release package
        run: |
          # Rename the package.zip created by pnpm package
          mv package.zip uniqtab-v${{ steps.version.outputs.version }}.zip

          # Create a source code archive
          zip -r uniqtab-source-v${{ steps.version.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*release-package*" \
            -x "*.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            uniqtab-v${{ steps.version.outputs.version }}.zip \
            uniqtab-source-v${{ steps.version.outputs.version }}.zip

      - name: Upload Release Assets Summary
        run: |
          {
            echo "### 📦 Release Created Successfully!"
            echo ""
            echo "**Version:** v${{ steps.version.outputs.version }}"
            echo "**Tag:** ${{ github.ref_name }}"
            echo ""
            echo "**Assets:**"
            echo "- \`uniqtab-v${{ steps.version.outputs.version }}.zip\` - Chrome Extension package"
            echo "- \`uniqtab-source-v${{ steps.version.outputs.version }}.zip\` - Source code"
          } >> "$GITHUB_STEP_SUMMARY"
